<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KIVU</title>
  <link rel="stylesheet" href="/app/static/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Login</h1>
        <p>Access your dashboard and appointments.</p>
      </div>

      <div id="authMessage" class="notification" style="display: none;"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
          type="email",
          id="email",
          name="email",
          placeholder="Enter your email"
          required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
          type="password",
          id="password",
          name="password",
          placeholder="Enter your password"
          required
          />
        </div>

        <button type="submit" class="primary-btn auth-btn">Login</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account yet? <a href="/app/templates/auth/register.html">Register Here</a></p>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='JS/auth.js') }}"></script>
</body>
</html>
