<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - KIVU</title>
  <link rel="stylesheet" href="/app/static/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Patient Registration</h1>
        <p>Create an account and book appointments.</p>
      </div>

      <div id="authMessage" class="notification" style="display: none;"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your full name"
          required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
          type="password"
          id="password"
          name="password"
          placeholder="Create a password"
          required
          />
        </div>

        <button type="submit" class="primary-btn auth-btn">Register</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/app/templates/auth/login.html">Login here</a></p>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='JS/auth.js') }}"></script>
</body>
</html>
