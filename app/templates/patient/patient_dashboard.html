<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard - Kivu (HAQMS)</title>
  <link rel="stylesheet" href="/app/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">Kigali Hospital</div>
    <div class="topbar-right">
      <span class="patient-name" id="patientName">Welcome, Patient</span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="dashboard-container">
    <section class="welcome-section">
      <h1>Patient Dashboard</h1>
      <p>Better appointments, Better Healthcare.</p>
    </section>

    <section class="summary-cards">
      <div class="card">
        <h3>Next Appointment</h3>
        <p id="nextAppointment">N/A</p>
      </div>

      <div class="card">
        <h3>Queue Number</h3>
        <p id="queueNumber">N/A</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p class="status-pending" id="currentStatus">N/A</p>
      </div>

      <div class="card">
        <h3>Total Appointments</h3>
        <p id="totalAppointments">0</p>
      </div>
    </section>

    <section class="content-grid">
      <div class="panel">
        <h2>Book Appointment</h2>
        <form class="appointment-form" id="bookingForm">
          <div class="form-group">
            <label for="appointment-date">Appointment Date</label>
            <input type="date" id="appointmentDate" name="appointmentDate" required>
          </div>

          <div class="form-group">
            <label for="reason">Reason</label>
            <textarea id="reason" name="reason" rows="4" placeholder="Describe your reason for the visit..."></textarea>
          </div>

          <button type="submit" class="primary-btn">Book Appointment</button>
        </form>
      </div>

      <div class="panel">
        <h2>Notifications</h2>
        <div id="notificationBox" class="notification" style="display: none;"></div>
      </div>
    </section>

    <section class="appointments-section panel">
      <h2>My Appointments</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Reason</th>
              <th>Queue No</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="appointmentsTableBody">
          </tbody>
        </table>
      </div>
    </section>
  </main>
  
  <script src="{{ url_for('static', filename='JS/patientDashboard.js') }}"></script>
</body>
</html>
